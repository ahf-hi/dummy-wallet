<!DOCTYPE html>
<html>
<head>
    <title>Dummy Wallet Channel</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; background: #f4f4f4; }
        .loader { border: 4px solid #f3f3f3; border-top: 4px solid #3498db; border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div style="text-align: center;">
        <div class="loader"></div>
        <p>Processing Payment via TNG...</p>
    </div>

    <script>
        window.onload = function() {
            const params = new URLSearchParams(window.location.search);
            const transId = params.get('transId');
            
            // Hardcoded values for the dummy response
            const merchantId = "000000000000006";
            const redirectUrl = `https://devlinkv2.paydee.co/mpigw_dummy/wallet/payment-status/redirect?transId=${transId}&merchantId=${merchantId}`;

            const responsePayload = {
                "item": {
                    "store": { "id": "1767688690703368016", "name": "paydee merchant 1" },
                    "transactionId": "TXN-" + Date.now(),
                    "order": { "id": transId, "amount": 100 },
                    "status": "FAILED", // You can toggle this to SUCCESS for testing
                    "error": { "message": "Order error" },
                    "transactionAt": new Date().toISOString()
                },
                "code": "SUCCESS"
            };

            // 2ms delay as requested
            setTimeout(() => {
                const form = document.createElement('form');
                form.method = 'POST';
                form.action = redirectUrl;

                const input = document.createElement('input');
                input.type = 'hidden';
                input.name = 'data'; // Standard naming, adjust if your system uses a different key
                input.value = JSON.stringify(responsePayload);

                form.appendChild(input);
                document.body.appendChild(form);
                form.submit();
            }, 2);
        };
    </script>
</body>
</html>
